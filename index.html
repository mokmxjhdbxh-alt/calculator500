    * { box-sizing:border-box; margin:0; padding:0; }

    body {
        font-family:'Cairo','Segoe UI',Tahoma,sans-serif;
        background:var(--bg-body); color:var(--text-main);
        text-align:center; padding:10px;
        padding-bottom:300px;
        transition:background 0.35s,color 0.35s;
        user-select:none; overflow-x:hidden; min-height:100vh;
    }

    /* ══════════════════════════════════════
       TOP BAR
    ══════════════════════════════════════ */
    .top-bar {
        display:flex; justify-content:space-between;
        max-width:500px; margin:0 auto 12px; gap:8px; align-items:center;
    }
    .icon-btn {
        background:var(--bg-card); border:1px solid var(--border);
        color:var(--text-main); padding:10px 8px; border-radius:12px;
        flex:1; cursor:pointer; font-family:'Cairo',sans-serif;
        font-size:0.82rem; font-weight:700;
        transition:background 0.2s,transform 0.1s;
    }
    .icon-btn:active { transform:scale(0.95); }

    /* زر القائمة */
    .menu-btn {
        background:var(--bg-card); border:1px solid var(--border);
        color:var(--text-main); width:44px; height:44px;
        border-radius:12px; cursor:pointer; font-size:1.3rem;
        display:flex; align-items:center; justify-content:center;
        flex-shrink:0; transition:background 0.2s,transform 0.1s;
    }
    .menu-btn:active { transform:scale(0.93); }

    /* ══════════════════════════════════════
       DROPDOWN MENU
    ══════════════════════════════════════ */
    .menu-wrapper { position:relative; }

    .dropdown {
        display:none; position:absolute;
        top:50px; right:0;
        background:var(--bg-card); border:1px solid var(--border);
        border-radius:16px; min-width:220px; z-index:2000;
        box-shadow:0 8px 32px rgba(0,0,0,0.5);
        overflow:hidden;
        animation:slideDown 0.2s ease;
    }
    @keyframes slideDown {
        from { opacity:0; transform:translateY(-10px); }
        to   { opacity:1; transform:translateY(0); }
    }
    .dropdown.open { display:block; }

    .menu-section-title {
        padding:10px 16px 6px;
        font-size:0.72rem; font-weight:700;
        color:var(--text-sub); text-align:right;
        border-bottom:1px solid var(--border);
        letter-spacing:0.5px;
    }

    .menu-item {
        display:flex; align-items:center; gap:10px;
        padding:13px 16px; cursor:pointer;
        font-size:0.9rem; font-weight:700;
        transition:background 0.15s;
        border-bottom:1px solid var(--border);
        text-align:right;
    }
    .menu-item:last-child { border-bottom:none; }
    .menu-item:active { background:var(--border); }
    .menu-item .mi-icon { font-size:1.1rem; width:22px; text-align:center; flex-shrink:0; }

    /* الثيمات داخل القائمة */
    .themes-grid {
        display:grid; grid-template-columns:repeat(3,1fr);
        gap:8px; padding:12px;
    }
    .theme-chip {
        border-radius:10px; padding:8px 4px;
        cursor:pointer; font-size:0.75rem; font-weight:700;
        border:2px solid transparent;
        transition:transform 0.15s, border-color 0.2s;
        font-family:'Cairo',sans-serif;
    }
    .theme-chip:active { transform:scale(0.93); }
    .theme-chip.active-theme { border-color:white !important; }

    /* ══════════════════════════════════════
       HEADER
    ══════════════════════════════════════ */
    .header-top {
        max-width:500px; margin:0 auto 14px;
        display:flex; justify-content:space-between; align-items:center;
    }
    h2 { color:var(--primary); font-size:1.4rem; font-weight:900; }
    #round-counter {
        background:var(--bg-card); padding:5px 14px;
        border-radius:20px; border:1px solid var(--border);
        font-size:0.85rem; font-weight:700; color:var(--text-sub);
    }

    /* ══════════════════════════════════════
       PLAYER CARDS
    ══════════════════════════════════════ */
    .players-container {
        display:grid; grid-template-columns:repeat(2,1fr);
        gap:10px; max-width:500px; margin:0 auto;
    }
    .player-card {
        background:var(--bg-card); padding:14px 8px 12px;
        border-radius:18px; border:2px solid var(--border);
        position:relative; cursor:pointer;
        transition:border-color 0.25s,box-shadow 0.25s,transform 0.15s;
    }
    .player-card:active { transform:scale(0.97); }
    .player-card.active-card {
        border-color:var(--primary);
        box-shadow:0 0 16px var(--card-glow);
    }
    .name-wrapper {
        display:flex; align-items:center; justify-content:center;
        gap:4px; margin-bottom:6px; padding:0 4px;
    }
    .name-input {
        background:transparent; border:none;
        border-bottom:1px solid var(--border);
        color:var(--primary); text-align:center;
        font-weight:700; font-family:'Cairo',sans-serif;
        width:0; flex:1; font-size:0.95rem; max-width:110px;
        overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .name-input:focus { outline:none; border-bottom-color:var(--primary); }
    .del-name {
        background:rgba(239,71,111,0.15); color:var(--danger);
        border:none; border-radius:50%; width:22px; height:22px;
        cursor:pointer; font-size:13px;
        display:flex; align-items:center; justify-content:center;
        flex-shrink:0; transition:background 0.2s;
    }
    .del-name:active { background:rgba(239,71,111,0.35); }
    .total-score {
        font-size:2.6em; color:var(--accent);
        font-weight:900; margin:4px 0; line-height:1.1;
        transition:color 0.3s;
    }
    .total-score.danger { color:var(--danger); animation:pulse 1s infinite; }
    .total-score.warn   { color:var(--warn); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }
    .score-display {
        width:85%; padding:8px 10px; border-radius:10px;
        background:var(--input-bg); color:var(--text-main);
        font-size:1.5rem; font-weight:700;
        font-family:'Cairo',sans-serif; min-height:42px;
        border:2px solid transparent; margin:0 auto;
        transition:border-color 0.2s,box-shadow 0.2s;
    }
    .active-input {
        border-color:var(--primary) !important;
        box-shadow:0 0 10px var(--card-glow);
    }
    .is-dealer::after {
        content:"🃏 الموزع";
        position:absolute; top:-11px; left:50%; transform:translateX(-50%);
        background:var(--danger); color:white;
        padding:2px 12px; border-radius:20px;
        font-size:0.68rem; font-weight:700; white-space:nowrap;
    }

    /* ══════════════════════════════════════
       SUBMIT
    ══════════════════════════════════════ */
    #main-submit {
        background:var(--border); color:white; padding:16px;
        border:none; border-radius:14px; width:95%; max-width:500px;
        margin-top:14px; font-weight:700; font-size:1.05rem;
        font-family:'Cairo',sans-serif;
        transition:background 0.25s,opacity 0.25s,transform 0.1s;
        opacity:0.5; cursor:pointer;
    }
    #main-submit:active { transform:scale(0.98); }

    /* ══════════════════════════════════════
       ACTION ROW
    ══════════════════════════════════════ */
    .action-row {
        display:flex; gap:10px; max-width:500px;
        margin:12px auto; width:95%;
    }
    .action-row button {
        flex:1; padding:14px; border-radius:12px;
        border:none; font-weight:700;
        font-family:'Cairo',sans-serif; font-size:0.95rem;
        cursor:pointer; transition:opacity 0.2s,transform 0.1s;
    }
    .action-row button:active { transform:scale(0.97); opacity:0.85; }

    /* ══════════════════════════════════════
       NUMPAD
    ══════════════════════════════════════ */
    .numpad {
        position:fixed; bottom:0; left:0; width:100%;
        background:var(--numpad-bg);
        padding:12px 10px 16px;
        display:grid; grid-template-columns:repeat(4,1fr);
        gap:7px; z-index:1000;
        border-top:1px solid var(--border);
        border-radius:20px 20px 0 0;
        box-shadow:0 -4px 20px rgba(0,0,0,0.4);
    }
    .num-btn {
        background:var(--numpad-btn); color:var(--text-main);
        border:1px solid var(--border); padding:18px 0;
        font-size:1.5rem; font-weight:700;
        font-family:'Cairo',sans-serif;
        border-radius:12px; cursor:pointer;
        touch-action:manipulation;
        transition:background 0.15s,transform 0.1s;
    }
    .num-btn:active { background:var(--border); transform:scale(0.93); }

    /* ══════════════════════════════════════
       FOOTER
    ══════════════════════════════════════ */
    .footer-credits {
        margin:20px auto; padding:16px;
        color:var(--text-sub); font-size:0.85rem;
        border-top:1px solid var(--border); max-width:500px;
    }

    /* ══════════════════════════════════════
       QR MODAL (محسّن)
    ══════════════════════════════════════ */
    #qr-modal {
        display:none; position:fixed; inset:0;
        background:rgba(0,0,0,0.92); z-index:3000;
        justify-content:center; align-items:center; flex-direction:column;
        padding:20px;
    }
    .qr-box {
        background:var(--bg-card); border:1px solid var(--border);
        border-radius:24px; padding:28px 24px;
        max-width:320px; width:100%;
        animation:popIn 0.3s ease;
    }
    .qr-title {
        color:var(--primary); font-size:1.1rem;
        font-weight:900; margin-bottom:6px;
    }
    .qr-subtitle {
        color:var(--text-sub); font-size:0.8rem;
        margin-bottom:16px;
    }
    #qrcode {
        background:white; padding:12px;
        border-radius:14px; display:inline-block;
        margin-bottom:16px;
    }
    /* نتائج تحت الباركود */
    .qr-scores {
        background:var(--input-bg); border-radius:12px;
        padding:12px; margin-bottom:16px;
        text-align:right; font-size:0.9rem;
        color:var(--text-main); line-height:2;
    }
    .qr-actions {
        display:grid; grid-template-columns:1fr 1fr;
        gap:8px;
    }
    .qr-btn {
        padding:12px; border-radius:12px; border:none;
        font-family:'Cairo',sans-serif; font-weight:700;
        font-size:0.9rem; cursor:pointer;
        transition:transform 0.1s;
    }
    .qr-btn:active { transform:scale(0.96); }
    .qr-close {
        grid-column:span 2; padding:12px;
        border-radius:12px; border:none;
        background:var(--border); color:var(--text-main);
        font-family:'Cairo',sans-serif; font-weight:700;
        font-size:0.9rem; cursor:pointer; margin-top:4px;
        transition:transform 0.1s;
    }

    /* ══════════════════════════════════════
       WINNER OVERLAY
    ══════════════════════════════════════ */
    #winner-overlay {
        display:none; position:fixed; inset:0;
        background:rgba(0,0,0,0.88); z-index:4000;
        justify-content:center; align-items:center; flex-direction:column;
    }
    .winner-box {
        background:var(--bg-card); border:2px solid var(--accent);
        border-radius:24px; padding:40px 30px; text-align:center;
        animation:popIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes popIn {
        from { transform:scale(0.5); opacity:0; }
        to   { transform:scale(1); opacity:1; }
    }
    .winner-box h1 { font-size:3rem; margin-bottom:10px; }
    .winner-box h2 { color:var(--accent); font-size:1.8rem; margin-bottom:8px; }
    .winner-box p  { color:var(--text-sub); margin-bottom:25px; }
    .winner-close-btn {
        background:var(--success); color:#000;
        border:none; border-radius:12px; padding:14px 40px;
        font-size:1.1rem; font-weight:700;
        font-family:'Cairo',sans-serif; cursor:pointer;
    }

    /* ══════════════════════════════════════
       TOAST
    ══════════════════════════════════════ */
    #toast {
        position:fixed; top:20px; left:50%;
        transform:translateX(-50%) translateY(-80px);
        background:var(--bg-card); border:1px solid var(--border);
        color:var(--text-main); padding:10px 24px;
        border-radius:30px; font-family:'Cairo',sans-serif;
        font-weight:700; font-size:0.95rem; z-index:5000;
        transition:transform 0.35s cubic-bezier(0.175,0.885,0.32,1.275);
        pointer-events:none; box-shadow:0 4px 24px rgba(0,0,0,0.4);
    }
    #toast.show { transform:translateX(-50%) translateY(0); }

    /* overlay لإغلاق القائمة */
    #menu-overlay {
        display:none; position:fixed; inset:0; z-index:1500;
    }
    #menu-overlay.open { display:block; }
</style>

    // STATE
    // ═══════════════════════
    let totals=[0,0,0,0], history=[], currentRound=1, dealerIndex=0, activeIndex=0, winnerShown=false;

    // ═══════════════════════
    // INIT
    // ═══════════════════════
    function initApp() {
        const grid = document.getElementById('players-grid');
        let html = '';
        for (let i=0;i<4;i++) {
            html += `
            <div class="player-card" id="card${i}" onclick="setActive(${i})">
                <div class="name-wrapper">
                    <input type="text" class="name-input" id="name${i}" value="لاعب ${i+1}"
                        maxlength="12" onchange="saveNames()" onclick="event.stopPropagation()">
                    <button class="del-name" onclick="clearSingleName(${i},event)">×</button>
                </div>
                <div class="total-score" id="score${i}">0</div>
                <div class="score-display" id="input${i}"></div>
            </div>`;
        }
        grid.innerHTML = html;
        loadState();
        loadTheme();
        adjustBodyPadding();
        setActive(0);
    }

    function adjustBodyPadding() {
        const n = document.getElementById('numpad');
        if (n) document.body.style.paddingBottom = (n.offsetHeight + 20) + 'px';
    }
    window.addEventListener('resize', adjustBodyPadding);

    // ═══════════════════════
    // MENU
    // ═══════════════════════
    function toggleMenu() {
        const dd = document.getElementById('dropdown');
        const ov = document.getElementById('menu-overlay');
        const isOpen = dd.classList.contains('open');
        dd.classList.toggle('open');
        ov.classList.toggle('open');
    }
    function closeMenu() {
        document.getElementById('dropdown').classList.remove('open');
        document.getElementById('menu-overlay').classList.remove('open');
    }

    // ═══════════════════════
    // THEMES
    // ═══════════════════════
    const THEMES = ['dark','light','gold','green','ocean','rose'];

    function setTheme(theme) {
        THEMES.forEach(t => document.body.classList.remove('theme-'+t));
        document.body.classList.add('theme-'+theme);
        localStorage.setItem('theme_v13', theme);
        // تحديث الـ chip النشط
        document.querySelectorAll('.theme-chip').forEach((el,i) => {
            el.classList.toggle('active-theme', THEMES[i] === theme);
        });
        closeMenu();
    }

    function loadTheme() {
        const saved = localStorage.getItem('theme_v13') || 'dark';
        setTheme(saved);
    }

    // ═══════════════════════
    // NAMES
    // ═══════════════════════
    function clearSingleName(idx, e) {
        e.stopPropagation();
        const el = document.getElementById('name'+idx);
        el.value = ''; el.focus();
    }
    function saveNames() {
        localStorage.setItem('names_v13', JSON.stringify([0,1,2,3].map(i=>document.getElementById('name'+i).value)));
    }
    function loadNames() {
        try {
            const n = JSON.parse(localStorage.getItem('names_v13'));
            if (Array.isArray(n)) n.forEach((v,i)=>{ const el=document.getElementById('name'+i); if(el&&v) el.value=v; });
        } catch(e){}
    }

    // ═══════════════════════
    // STATE SAVE/LOAD
    // ═══════════════════════
    function saveState() {
        try { localStorage.setItem('gameState_v13', JSON.stringify({totals,currentRound,dealerIndex})); } catch(e){}
    }
    function loadState() {
        loadNames();
        try {
            const raw = localStorage.getItem('gameState_v13');
            if (raw) {
                const s = JSON.parse(raw);
                if (Array.isArray(s.totals) && s.totals.length===4) {
                    totals=s.totals; currentRound=s.currentRound||1; dealerIndex=s.dealerIndex||0;
                }
            }
        } catch(e){}
        updateUI();
    }

    // ═══════════════════════
    // ACTIVE
    // ═══════════════════════
    function setActive(idx) {
        activeIndex=idx;
        document.querySelectorAll('.score-display').forEach(el=>el.classList.remove('active-input'));
        document.querySelectorAll('.player-card').forEach(el=>el.classList.remove('active-card'));
        document.getElementById('input'+idx).classList.add('active-input');
        document.getElementById('card'+idx).classList.add('active-card');
    }

    // ═══════════════════════
    // NUMPAD
    // ═══════════════════════
    function pressNum(val) {
        const display = document.getElementById('input'+activeIndex);
        const cur = display.innerText;
        if (val==='del') display.innerText = cur.slice(0,-1);
        else if (val==='-') { if (cur===''||cur==='0') display.innerText='-'; }
        else if (cur.length<5) display.innerText += val;
        validateInputs();
    }

    // ═══════════════════════
    // VALIDATE
    // ═══════════════════════
    function validateInputs() {
        const vals = [0,1,2,3].map(i=>parseInt(document.getElementById('input'+i).innerText)||0);
        const sum = vals.reduce((a,b)=>a+b,0);
        const btn = document.getElementById('main-submit');
        const ok = sum===130;
        btn.innerText = ok ? '✅ المجموع: 130 — قيد الآن!' : `المجموع: ${sum} (المطلوب 130)`;
        btn.style.opacity  = ok?'1':'0.5';
        btn.style.background = ok?'var(--success)':'var(--border)';
        btn.style.color = ok?'#000':'white';
        return ok;
    }

    // ═══════════════════════
    // ADD SCORES
    // ═══════════════════════
    function addScores() {
        if (!validateInputs()) { showToast('⚠️ المجموع يجب أن يكون 130'); return; }
        const scores = [0,1,2,3].map(i=>parseInt(document.getElementById('input'+i).innerText)||0);
        history.unshift({totals:[...totals], dealer:dealerIndex});
        scores.forEach((s,i)=>totals[i]+=s);
        dealerIndex=(dealerIndex+1)%4; currentRound++;
        [0,1,2,3].forEach(i=>document.getElementById('input'+i).innerText='');
        updateUI(); saveState(); setActive(0);
        if(navigator.vibrate) navigator.vibrate([60,30,60]);
        validateInputs();
    }

    // ═══════════════════════
    // UPDATE UI
    // ═══════════════════════
    function updateUI() {
        document.getElementById('round-counter').innerText=`الجولة: ${currentRound}`;
        totals.forEach((s,i)=>{
            const sc=document.getElementById('score'+i);
            const card=document.getElementById('card'+i);
            sc.innerText=s;
            sc.className='total-score'+(s>=500?' danger':s>=400?' warn':'');
            card.style.borderColor=s>=500?'var(--danger)':s>=400?'var(--warn)':'var(--border)';
            card.classList.toggle('is-dealer', i===dealerIndex);
            if (s>=500&&!winnerShown) {
                winnerShown=true;
                const name=document.getElementById('name'+i).value||`لاعب ${i+1}`;
                setTimeout(()=>showWinner(name,s),300);
            }
        });
    }

    // ═══════════════════════
    // WINNER
    // ═══════════════════════
    function showWinner(name,score) {
        document.getElementById('winner-name').innerText=`🎉 ${name}`;
        document.getElementById('winner-score').innerText=`وصل إلى ${score} نقطة!`;
        document.getElementById('winner-overlay').style.display='flex';
        if(navigator.vibrate) navigator.vibrate([200,100,200,100,300]);
    }
    function closeWinner() { document.getElementById('winner-overlay').style.display='none'; }

    // ═══════════════════════
    // UNDO
    // ═══════════════════════
    function undo() {
        if (!history.length) { showToast('⚠️ لا يوجد قيد للتراجع'); return; }
        const last=history.shift();
        totals=[...last.totals]; dealerIndex=last.dealer; currentRound--;
        winnerShown=totals.some(s=>s>=500);
        updateUI(); saveState(); showToast('↩️ تم التراجع عن آخر قيد');
    }

    // ═══════════════════════
    // DEALER
    // ═══════════════════════
    function moveDealer() { dealerIndex=(dealerIndex+1)%4; updateUI(); }

    // ═══════════════════════
    // RESET
    // ═══════════════════════
    function confirmReset() {
        if (!confirm('هل تريد تصفير النشرة بالكامل؟')) return;
        totals=[0,0,0,0]; history=[]; currentRound=1; dealerIndex=0; activeIndex=0; winnerShown=false;
        [0,1,2,3].forEach(i=>document.getElementById('input'+i).innerText='');
        localStorage.removeItem('gameState_v13');
        updateUI(); validateInputs(); setActive(0);
        showToast('🔄 تم تصفير النشرة');
    }

    // ═══════════════════════
    // QR — محسّن
    // ═══════════════════════
    function buildResultsText() {
        let text = `🃏 نشرة أبو سلاس\nالجولة: ${currentRound-1}\n${'─'.repeat(20)}\n`;
        [0,1,2,3].forEach(i=>{
            const name=document.getElementById('name'+i).value||`لاعب ${i+1}`;
            text += `${name}: ${totals[i]} نقطة\n`;
        });
        text += `${'─'.repeat(20)}\nتطوير: أبو سلاس © 2026`;
        return text;
    }

    function openQR() {
        const modal = document.getElementById('qr-modal');
        const qrContainer = document.getElementById('qrcode');
        const scoresEl = document.getElementById('qr-scores-text');
        qrContainer.innerHTML='';

        const text = buildResultsText();

        // عرض النتائج تحت الباركود
        let html='';
        [0,1,2,3].forEach(i=>{
            const name=document.getElementById('name'+i).value||`لاعب ${i+1}`;
            html+=`<div style="display:flex;justify-content:space-between;padding:2px 0">
                <span style="color:var(--primary);font-weight:700">${totals[i]}</span>
                <span>${name}</span>
            </div>`;
        });
        html+=`<div style="color:var(--text-sub);font-size:0.78rem;margin-top:6px;text-align:center">الجولة ${currentRound-1}</div>`;
        scoresEl.innerHTML=html;

        new QRCode(qrContainer, { text, width:180, height:180, correctLevel:QRCode.CorrectLevel.M });
        modal.style.display='flex';
    }

    function closeQR() { document.getElementById('qr-modal').style.display='none'; }

    // مشاركة عبر Web Share API
    async function shareResults() {
        const text = buildResultsText();
        if (navigator.share) {
            try {
                await navigator.share({ title:'نشرة أبو سلاس', text });
                showToast('✅ تمت المشاركة');
            } catch(e) {
                if(e.name!=='AbortError') copyResults();
            }
        } else {
            copyResults();
        }
    }

    // نسخ النتائج
    function copyResults() {
        const text = buildResultsText();
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text)
                .then(()=>showToast('📋 تم النسخ!'))
                .catch(()=>fallbackCopy(text));
        } else { fallbackCopy(text); }
        closeQR();
    }

    function fallbackCopy(text) {
        const ta=document.createElement('textarea');
        ta.value=text; document.body.appendChild(ta);
        ta.select(); document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('📋 تم النسخ!');
    }

    // ═══════════════════════
    // TOAST
    // ═══════════════════════
    function showToast(msg) {
        const t=document.getElementById('toast');
        t.innerText=msg; t.classList.add('show');
        setTimeout(()=>t.classList.remove('show'),2500);
    }
</script>
