<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>حاسبة الـ 500 الاحترافية V8.1</title>
    <style>
        :root {
            --bg-body: #121212; --bg-card: #1E1E1E; --text-main: #E0E0E0;
            --primary-blue: #81D4FA; --accent-yellow: #FFC107; --danger-red: #FF5252;
            --success-green: #4CAF50; --border: #444; --input-bg: #2D2D2D;
            --warning-orange: #FF9800;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background-color: var(--bg-body); color: var(--text-main); 
            text-align: center; margin: 0; padding: 10px; transition: 0.4s;
            /* منع تحديد النص ومنع القوائم المنبثقة ليعطي شعور التطبيق */
            user-select: none; 
            -webkit-touch-callout: none; 
            overflow-x: hidden; 
            padding-bottom: 300px; 
            touch-action: pan-y; /* يسمح بالتمرير الطولي فقط ويمنع الزووم اللمسي */
        }

        .header-top { display: flex; justify-content: space-between; align-items: center; max-width: 500px; margin: 0 auto 10px; }
        
        .players-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 500px; margin: 0 auto; }
        .player-card { 
            background: var(--bg-card); padding: 12px; border-radius: 15px; 
            border: 2px solid var(--border); position: relative; transition: 0.3s;
        }
        
        .status-safe { border-color: var(--success-green); }
        .status-warning { border-color: var(--warning-orange); box-shadow: 0 0 10px rgba(255, 152, 0, 0.3); }
        .status-danger { border-color: var(--danger-red); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0px var(--danger-red); } 50% { box-shadow: 0 0 15px var(--danger-red); } 100% { box-shadow: 0 0 0px var(--danger-red); } }

        .is-dealer::after { content: "🃏 الموزع"; position: absolute; top: -10px; left: 50%; transform: translateX(-50%); background: var(--danger-red); color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; }

        .total-score { font-size: 2.5em; color: var(--accent-yellow); font-weight: bold; margin: 5px 0; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; justify-content: center; margin-top: 5px; }
        .name-input { background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--primary-blue); text-align: center; font-weight: bold; width: 70%; font-size: 1rem; }
        .score-display { width: 80%; padding: 8px; border-radius: 8px; background: var(--input-bg); color: var(--text-main); font-size: 1.3rem; min-height: 35px; border: 1px solid var(--border); }
        .clear-btn { background: #555; color: white; border: none; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; font-size: 12px; margin-left: 5px; }

        .numpad { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #252525; padding: 10px 0; display: grid; 
            grid-template-columns: repeat(4, 1fr); gap: 5px; 
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5); z-index: 1000;
        }
        .num-btn { 
            background: #333; color: white; border: none; padding: 15px 0; 
            font-size: 1.5rem; font-weight: bold; border-radius: 5px; cursor: pointer;
            touch-action: manipulation; /* تسريع الاستجابة للمس */
        }
        .num-btn:active { background: #555; }
        .action-btn { background: var(--success-green); color: white; }
        .delete-btn { background: var(--danger-red); }

        #history-log { max-width: 500px; margin: 20px auto; background: var(--bg-card); border-radius: 12px; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        td { padding: 10px; border-bottom: 1px solid var(--border); }
        .inc-score { color: var(--success-green); font-size: 0.7em; display: block; }

        .active-input { border: 2px solid var(--primary-blue) !important; }
        #winner-msg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; flex-direction: column; justify-content: center; align-items: center; }
    </style>
</head>
<body onload="initApp()">

    <div class="header-top">
        <h2 style="color: var(--primary-blue); margin: 0;">حاسبة الـ 500 🏆</h2>
        <div id="round-counter" style="font-weight: bold;">الجولة: 1</div>
    </div>

    <div class="players-container">
        <script>
            for(let i=0; i<4; i++) {
                document.write(`
                    <div class="player-card" id="card${i}" onclick="setActive(${i})">
                        <div class="input-wrapper">
                            <input type="text" class="name-input" id="name${i}" value="لاعب ${i+1}" onchange="saveNames()">
                            <button class="clear-btn" onclick="clearName(${i})">✕</button>
                        </div>
                        <div class="total-score" id="score${i}">0</div>
                        <div class="input-wrapper">
                            <div class="score-display" id="input${i}"></div>
                            <button class="clear-btn" onclick="clearInput(${i})">✕</button>
                        </div>
                    </div>
                `);
            }
        </script>
    </div>

    <button class="btn" onclick="addScores()" style="background:var(--success-green); color:white; padding:15px; border:none; border-radius:10px; width:95%; max-width:500px; margin-top:15px; font-weight:bold; font-size:1.2rem;">تسجيل النشرة 📢</button>
    
    <div style="display: flex; gap: 10px; max-width: 500px; margin: 10px auto; width: 95%;">
        <button onclick="undo()" style="flex:1; padding:10px; border-radius:8px; background:#1565C0; color:white; border:none;">↩️ تراجع</button>
        <button onclick="moveDealer()" style="flex:1; padding:10px; border-radius:8px; background:#6a1b9a; color:white; border:none;">🎯 الموزع</button>
        <button onclick="confirmReset()" style="flex:1; padding:10px; border-radius:8px; background:var(--danger-red); color:white; border:none;">🗑️ تصفير</button>
    </div>

    <div id="history-log">
        <table><tbody id="history-body"></tbody></table>
    </div>

    <div class="numpad">
        <button class="num-btn" onclick="pressNum('1')">1</button>
        <button class="num-btn" onclick="pressNum('2')">2</button>
        <button class="num-btn" onclick="pressNum('3')">3</button>
        <button class="num-btn delete-btn" onclick="pressNum('del')">⌫</button>
        <button class="num-btn" onclick="pressNum('4')">4</button>
        <button class="num-btn" onclick="pressNum('5')">5</button>
        <button class="num-btn" onclick="pressNum('6')">6</button>
        <button class="num-btn action-btn" onclick="setActive((activeIndex+1)%4)">التالي</button>
        <button class="num-btn" onclick="pressNum('7')">7</button>
        <button class="num-btn" onclick="pressNum('8')">8</button>
        <button class="num-btn" onclick="pressNum('9')">9</button>
        <button class="num-btn action-btn" style="background:#555" onclick="addScores()">قيد</button>
        <button class="num-btn" onclick="pressNum('0')" style="grid-column: span 2;">0</button>
        <button class="num-btn" onclick="pressNum('-')" style="background:#444">-</button>
        <button class="num-btn" onclick="confirmReset()" style="background:#444">🔄</button>
    </div>

    <div id="winner-msg">
        <h1 style="color:white">هاردلك يالامير!</h1>
        <div id="winner-text" style="font-size: 2.5rem; color:var(--danger-red); margin: 20px; font-weight:bold;"></div>
        <button onclick="location.reload()" style="padding:15px 40px; border-radius:10px; background:var(--success-green); color:white; border:none; font-size:1.2rem;">لعبة جديدة</button>
    </div>

    <script>
        let totals = [0,0,0,0], history = [], currentRound = 1, dealerIndex = 0, activeIndex = 0;

        function fixNumbers(str) {
            const p = [/٠/g, /١/g, /٢/g, /٣/g, /٤/g, /٥/g, /٦/g, /٧/g, /٨/g, /٩/g];
            for (let i=0; i<10; i++) str = str.toString().replace(p[i], i);
            return str;
        }

        function pressNum(val) {
            let display = document.getElementById('input' + activeIndex);
            if (val === 'del') {
                display.innerText = display.innerText.slice(0, -1);
            } else {
                display.innerText = fixNumbers(display.innerText + val);
            }
        }

        function setActive(idx) {
            activeIndex = idx;
            for(let i=0; i<4; i++) document.getElementById('input'+i).classList.remove('active-input');
            document.getElementById('input'+idx).classList.add('active-input');
        }

        function clearInput(idx) { document.getElementById('input'+idx).innerText = ''; event.stopPropagation(); }
        function clearName(idx) { document.getElementById('name'+idx).value = ''; event.stopPropagation(); }

        function addScores() {
            let roundScores = [0,1,2,3].map(i => parseInt(document.getElementById('input'+i).innerText) || 0);
            if (roundScores.every(s => s === 0)) return;

            history.unshift({ round: currentRound, scores: [...roundScores], totals: [...totals] });
            roundScores.forEach((s, i) => totals[i] += s);
            
            dealerIndex = (dealerIndex + 1) % 4;
            currentRound++;
            updateUI();
            checkWinner();
            [0,1,2,3].forEach(i => document.getElementById('input'+i).innerText = '');
            setActive(0);
        }

        function updateUI() {
            document.getElementById('round-counter').innerText = `الجولة: ${currentRound}`;
            totals.forEach((s, i) => {
                document.getElementById('score'+i).innerText = s;
                const card = document.getElementById('card'+i);
                card.className = 'player-card'; 
                if (s >= 450) card.classList.add('status-danger');
                else if (s >= 350) card.classList.add('status-warning');
                else card.classList.add('status-safe');
                if (i === dealerIndex) card.classList.add('is-dealer');
            });

            const body = document.getElementById('history-body');
            body.innerHTML = history.map(h => `
                <tr>
                    <td style="font-weight:bold; color:var(--primary-blue)">ج${h.round}</td>
                    ${h.totals.map((t, i) => `<td>${t + h.scores[i]}<span class="inc-score">${h.scores[i] >=0 ? '+' : ''}${h.scores[i]}</span></td>`).join('')}
                </tr>
            `).join('');
        }

        function checkWinner() {
            let losers = totals.map((s, i) => s >= 500 ? document.getElementById('name'+i).value : null).filter(n => n);
            if (losers.length > 0) {
                document.getElementById('winner-msg').style.display = 'flex';
                document.getElementById('winner-text').innerText = losers.join(' و ');
            }
        }

        function moveDealer() { dealerIndex = (dealerIndex + 1) % 4; updateUI(); }
        function undo() {
            if (history.length === 0) return;
            const last = history.shift();
            totals = [...last.totals];
            currentRound--;
            dealerIndex = (dealerIndex - 1 + 4) % 4;
            updateUI();
        }
        function saveNames() {
            const names = [0,1,2,3].map(i => document.getElementById('name'+i).value);
            localStorage.setItem('names_500_v8_1', JSON.stringify(names));
        }
        function loadNames() {
            const names = JSON.parse(localStorage.getItem('names_500_v8_1'));
            if (names) names.forEach((n, i) => document.getElementById('name'+i).value = n);
        }
        function confirmReset() { if(confirm("تصفير النقاط؟")) { totals = [0,0,0,0]; history = []; currentRound = 1; updateUI(); } }
        function initApp() { loadNames(); updateUI(); setActive(0); }
    </script>
</body>
</html>
