<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة الـ 500 الاحترافية</title>
    <style>
        :root {
            /* الألوان الافتراضية (الوضع الداكن) */
            --primary-blue: #81D4FA;
            --accent-yellow: #FFC107;
            --danger-red: #FF5252;
            --success-green: #4CAF50;
            --bg-dark: #121212;
            --card-bg: #1E1E1E;
            --text-color: #E0E0E0;
            --table-header: #252525;
            --input-bg: #2D2D2D;
            --border-color: #444;
        }

        /* تنسيقات الوضع الفاتح */
        body.light-mode {
            --bg-dark: #F5F5F5;
            --card-bg: #FFFFFF;
            --text-color: #333333;
            --table-header: #EEEEEE;
            --input-bg: #FFFFFF;
            --border-color: #DDD;
            --primary-blue: #0288D1;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-dark); 
            color: var(--text-color); 
            text-align: center; 
            margin: 0; padding: 10px; 
            user-select: none;
            transition: background 0.3s, color 0.3s;
        }

        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 500px;
            margin: 0 auto 10px auto;
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
        }

        h1 { color: var(--primary-blue); margin: 0; font-size: 1.5rem; }
        
        .round-info { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-bottom: 15px;
            font-weight: bold;
        }

        .players-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            max-width: 500px;
            margin: 0 auto 20px auto;
        }
        
        .player-card { 
            background-color: var(--card-bg); 
            padding: 15px; 
            border-radius: 15px; 
            border: 2px solid var(--border-color);
            transition: all 0.3s ease;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .is-dealer { 
            border-color: var(--danger-red); 
            box-shadow: 0 0 15px rgba(255, 82, 82, 0.3);
            background-color: rgba(255, 82, 82, 0.05);
        }

        .dealer-arrow {
            display: none;
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5em;
            color: var(--danger-red);
        }
        .is-dealer .dealer-arrow { display: block; }

        .total-score { 
            font-size: 2.5em; 
            color: var(--accent-yellow); 
            font-weight: bold; 
            margin: 5px 0;
        }

        input[type="text"].name-input { 
            width: 80%; border: none; border-bottom: 2px solid var(--border-color);
            background: transparent; color: var(--primary-blue);
            text-align: center; font-size: 1.1em; font-weight: bold;
        }

        input[type="text"].score-input { 
            width: 85%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); 
            text-align: center; font-size: 1.2em; background-color: var(--input-bg); color: var(--text-color); 
        }

        .btn { 
            background-color: var(--success-green); color: white; padding: 15px; 
            border: none; border-radius: 10px; font-size: 1.2em; cursor: pointer; 
            width: 100%; max-width: 500px; margin-bottom: 10px; font-weight: bold;
            box-shadow: 0 4px 0 #388E3C;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #388E3C; }
        
        .secondary-btns { display: flex; gap: 10px; max-width: 500px; margin: 0 auto 20px auto; }
        .btn-edit { background-color: #1565C0; flex: 1; padding: 10px; font-size: 0.9em; box-shadow: 0 4px 0 #0D47A1; }
        .btn-reset { background-color: var(--danger-red); flex: 1; padding: 10px; font-size: 0.9em; box-shadow: 0 4px 0 #C62828; }

        /* تعديلات الجدول الجديدة */
        #history-log { 
            max-width: 500px; margin: 20px auto; 
            background-color: var(--card-bg); 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            overflow: hidden; 
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 8px; border-bottom: 1px solid var(--border-color); font-size: 0.9em; }
        th { background-color: var(--table-header); color: var(--primary-blue); font-weight: 800; }
        .inc-score { display: block; color: var(--success-green); font-size: 0.75em; font-weight: bold; }

        #winner-msg { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; 
            justify-content: center; align-items: center; 
        }
    </style>
</head>
<body class="">

    <div class="header-controls">
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">🌙 وضع الليل</button>
        <h1>حاسبة الـ 500 ♠️</h1>
    </div>

    <div class="round-info">
        <div id="round-counter">الجولة: 1</div>
        <div style="color:var(--danger-red)" id="dealer-name-display">الموزع: اللاعب 1</div>
    </div>

    <div class="players-container">
        <div class="player-card is-dealer" id="card1">
            <span class="dealer-arrow">⬇️</span>
            <input type="text" class="name-input" id="name1" value="اللاعب 1" onchange="saveData()">
            <div class="total-score" id="score1">0</div>
            <input type="text" class="score-input" id="input1" placeholder="سجل" inputmode="numeric" onkeypress="handleKey(event, 2)">
        </div>
        <div class="player-card" id="card2">
            <span class="dealer-arrow">⬇️</span>
            <input type="text" class="name-input" id="name2" value="اللاعب 2" onchange="saveData()">
            <div class="total-score" id="score2">0</div>
            <input type="text" class="score-input" id="input2" placeholder="سجل" inputmode="numeric" onkeypress="handleKey(event, 3)">
        </div>
        <div class="player-card" id="card3">
            <span class="dealer-arrow">⬇️</span>
            <input type="text" class="name-input" id="name3" value="اللاعب 3" onchange="saveData()">
            <div class="total-score" id="score3">0</div>
            <input type="text" class="score-input" id="input3" placeholder="سجل" inputmode="numeric" onkeypress="handleKey(event, 4)">
        </div>
        <div class="player-card" id="card4">
            <span class="dealer-arrow">⬇️</span>
            <input type="text" class="name-input" id="name4" value="اللاعب 4" onchange="saveData()">
            <div class="total-score" id="score4">0</div>
            <input type="text" class="score-input" id="input4" placeholder="سجل" inputmode="numeric" onkeypress="handleKey(event, 'finish')">
        </div>
    </div>

    <button class="btn" onclick="addScores()">تسجيل النشرة</button>
    <div class="secondary-btns">
        <button class="btn btn-edit" onclick="undo()">↩️ تراجع</button>
        <button class="btn btn-reset" onclick="confirmReset()">🗑️ تصفير</button>
    </div>
    
    <div id="history-log">
        <table>
            <thead>
                <tr>
                    <th>ج</th>
                    <th id="h-n1">1</th><th id="h-n2">2</th><th id="h-n3">3</th><th id="h-n4">4</th>
                </tr>
            </thead>
            <tbody id="history-body"></tbody>
        </table>
    </div>

    <div id="winner-msg">
        <h2 style="color:white">انتهت اللعبة!</h2>
        <div id="winner-text" style="font-size: 2em; color:var(--danger-red); margin: 20px; font-weight: bold;"></div>
        <button class="btn" style="width:200px" onclick="confirmReset()">لعبة جديدة</button>
    </div>

    <script>
        let totals = [0, 0, 0, 0];
        let history = [];
        let currentRound = 1;
        let dealerIndex = 0;

        // وظيفة الحفظ التلقائي
        function saveData() {
            const gameData = {
                totals, history, currentRound, dealerIndex,
                names: [
                    document.getElementById('name1').value,
                    document.getElementById('name2').value,
                    document.getElementById('name3').value,
                    document.getElementById('name4').value
                ],
                theme: document.body.classList.contains('light-mode') ? 'light' : 'dark'
            };
            localStorage.setItem('game500_data', JSON.stringify(gameData));
            updateUI();
        }

        // استعادة البيانات عند التحميل
        function loadData() {
            const saved = localStorage.getItem('game500_data');
            if (saved) {
                const data = JSON.parse(saved);
                totals = data.totals;
                history = data.history;
                currentRound = data.currentRound;
                dealerIndex = data.dealerIndex;
                data.names.forEach((n, i) => document.getElementById('name' + (i+1)).value = n);
                if (data.theme === 'light') toggleTheme(true);
            }
            updateUI();
        }

        function toggleTheme(forceLight = false) {
            if (forceLight) {
                document.body.classList.add('light-mode');
            } else {
                document.body.classList.toggle('light-mode');
            }
            const isLight = document.body.classList.contains('light-mode');
            document.getElementById('theme-btn').innerText = isLight ? '☀️ وضع النهار' : '🌙 وضع الليل';
            saveData();
        }

        function parseInput(str) {
            const ar = [/٠/g, /١/g, /٢/g, /٣/g, /٤/g, /٥/g, /٦/g, /٧/g, /٨/g, /٩/g];
            let cleanStr = str.toString();
            for(let i=0; i<10; i++) cleanStr = cleanStr.replace(ar[i], i);
            return parseInt(cleanStr) || 0;
        }

        function handleKey(e, target) {
            if (e.key === 'Enter') {
                e.preventDefault();
                if (target === 'finish') addScores();
                else document.getElementById('input' + target).focus();
            }
        }

        function addScores() {
            let roundScores = [];
            let anyData = false;
            for (let i = 1; i <= 4; i++) {
                let val = parseInput(document.getElementById('input' + i).value);
                roundScores.push(val);
                if (val !== 0) anyData = true;
                document.getElementById('input' + i).value = '';
            }
            if (!anyData) return;

            history.unshift({ round: currentRound, scores: [...roundScores], totals: [...totals], dealer: dealerIndex });
            for (let i = 0; i < 4; i++) totals[i] += roundScores[i];
            
            dealerIndex = (dealerIndex + 1) % 4;
            currentRound++;
            saveData();
            checkWinner();
            document.getElementById('input1').focus();
        }

        function updateUI() {
            document.getElementById('round-counter').innerText = `الجولة: ${currentRound}`;
            totals.forEach((s, i) => {
                document.getElementById('score' + (i + 1)).innerText = s;
                const card = document.getElementById('card' + (i + 1));
                i === dealerIndex ? card.classList.add('is-dealer') : card.classList.remove('is-dealer');
                document.getElementById('h-n' + (i + 1)).innerText = document.getElementById('name' + (i+1)).value;
            });

            const currentDealerName = document.getElementById('name' + (dealerIndex + 1)).value;
            document.getElementById('dealer-name-display').innerText = `الموزع: ${currentDealerName}`;

            const body = document.getElementById('history-body');
            body.innerHTML = history.map(h => `
                <tr>
                    <td style="background:var(--table-header); font-weight:bold">${h.round}</td>
                    ${h.totals.map((t, i) => {
                        const totalAfter = t + h.scores[i];
                        return `<td>${totalAfter}<span class="inc-score">+${h.scores[i]}</span></td>`
                    }).join('')}
                </tr>
            `).join('');
        }

        function checkWinner() {
            let losers = [];
            totals.forEach((s, i) => {
                if (s >= 500) losers.push(document.getElementById('name' + (i+1)).value);
            });
            if (losers.length > 0) {
                document.getElementById('winner-msg').style.display = 'flex';
                document.getElementById('winner-text').innerHTML = "هاردلك يالامير:<br>" + losers.join('<br>');
            }
        }

        function undo() {
            if (history.length === 0) return;
            const lastRound = history.shift();
            totals = [...lastRound.totals];
            dealerIndex = lastRound.dealer;
            currentRound--;
            saveData();
        }

        function confirmReset() {
            if (confirm("سيتم تصفير كل شيء، هل أنت متأكد؟")) {
                localStorage.removeItem('game500_data');
                location.reload();
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
